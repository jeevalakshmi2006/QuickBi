<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - QuickBI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; height: 100vh; background: #FADADD; overflow-y: auto; font-family: 'Rubik', sans-serif; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #FF69B4; color: white; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .company-name { font-size: 22px; font-weight: bold; }
        .back-btn { font-size: 20px; color: white; cursor: pointer; }
        .icons { display: flex; gap: 15px; }
        .icons i { font-size: 22px; cursor: pointer; }
        
        .settings-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .settings-box { background: #FF69B4; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(255, 105, 180, 0.5); color: white; font-weight: bold; width: 80%; text-align: center; margin-bottom: 20px; }
        .settings-section { width: 80%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); margin-top: 20px; }
        .settings-section h3 { color: #FF69B4; margin-bottom: 15px; }
        .settings-option { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <i class="fas fa-arrow-left back-btn" onclick="window.location.href='ds.html'"></i>
            <span class="company-name">QuickBI</span>
        </div>
        <div class="icons">
            <i class="fas fa-bell"></i>
            <i class="fas fa-user-circle"></i>
        </div>
    </header>
    
    <div class="settings-container">
        <div class="settings-box">
            <h2>Settings</h2>
            <p>Manage your preferences and account settings.</p>
        </div>
        
        <div class="settings-section">
            <h3>Account Settings</h3>
            <div class="settings-option">
                <span>Change Password</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-option">
                <span>Manage Profile</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>

        <div class="settings-section">
            <h3>Notification Preferences</h3>
            <div class="settings-option">
                <span>Email Notifications</span>
                <i class="fas fa-toggle-on"></i>
            </div>
            <div class="settings-option">
                <span>Push Notifications</span>
                <i class="fas fa-toggle-off"></i>
            </div>
        </div>

        <div class="settings-section">
            <h3>Privacy & Security</h3>
            <div class="settings-option">
                <span>Two-Factor Authentication</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="settings-option">
                <span>Data Privacy</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>
</body>
</html>
